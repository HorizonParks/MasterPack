name: Optimize resource pack

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  packsquash:
    name: Optimize resource pack
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove old generated files
        run: |
          rm -f pack.zip
          rm -f hash.txt
          find . -maxdepth 1 -type f -regex './[a-f0-9]\{40\}\.zip' -delete

      - name: Run PackSquash
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          options: |
            pack_directory = '.'
            output_file_path = './pack.zip'

      - name: Generate hash and hashed pack
        shell: bash
        run: |
          HASH="$(sha1sum pack.zip | cut -d ' ' -f 1)"
          echo -n "$HASH" > hash.txt
          cp pack.zip "${HASH}.zip"

          echo "Pack hash: $HASH"
          echo "Pack file: ${HASH}.zip"

      - name: Verify removed wooden pickaxe definition
        shell: bash
        run: |
          if unzip -l pack.zip | grep -q "assets/minecraft/items/wooden_pickaxe.json"; then
            echo "wooden_pickaxe.json is still inside pack.zip"
            unzip -l pack.zip | grep "wooden_pickaxe.json"
            exit 1
          else
            echo "Confirmed: wooden_pickaxe.json is not inside pack.zip"
          fi

      - name: Delete previous latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true

      - name: Create clean latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Resource Pack
          make_latest: true
          files: |
            pack.zip
            hash.txt
            [a-f0-9]*.zip
