name: Build Resource Pack

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resource-pack-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pack
        uses: actions/checkout@v4

      - name: Build optimized pack
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          options: |
            pack_directory = '.'
            output_file_path = './pack.zip'

      - name: Generate SHA-1 files
        id: pack
        shell: bash
        run: |
          HASH="$(sha1sum pack.zip | cut -d ' ' -f 1)"

          printf '%s' "$HASH" > hash.txt
          cp pack.zip "$HASH.zip"

          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Generated pack: $HASH.zip"

      - name: Remove previous release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release view latest \
              --json assets \
              --jq '.assets[].name' |
            while IFS= read -r asset; do
              gh release delete-asset latest "$asset" --yes
            done
          fi

      - name: Publish latest pack
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Resource Pack
          make_latest: true
          overwrite_files: true
          files: |
            pack.zip
            hash.txt
            ${{ steps.pack.outputs.hash }}.zip
